workflows:
  ios-dylib-build:
    name: Build iOS .dylib Library
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version

      - name: Create output directory
        script: |
          mkdir -p $CM_BUILD_DIR/build

      - name: Compile dynamic library
        script: |
          clang \
            -dynamiclib \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -arch arm64 \
            -miphoneos-version-min=12.0 \
            src/*.c \
            -o $CM_BUILD_DIR/build/libmylibrary.dylib

      - name: Verify output
        script: |
          echo "Built files:"
          ls -R $CM_BUILD_DIR/build

    artifacts:
      - build/**/*.dylib
